name: Build and Release FakeGPS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild -project FakeGPS.xcodeproj \
            -scheme FakeGPS \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify universal binary
        run: file build/Build/Products/Release/FakeGPS.app/Contents/MacOS/FakeGPS

      - name: Package app
        run: |
          cd build/Build/Products/Release
          zip -r -y FakeGPS.zip FakeGPS.app

      - name: Generate release notes
        id: notes
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD --no-merges | grep -v "Co-Authored-By")
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | grep -v "Co-Authored-By")
          fi
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_OUTPUT"
          # Write multiline output
          {
            echo "body<<EOF"
            echo "## Changes"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "Changes since $PREV_TAG:"
            fi
            echo ""
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/FakeGPS.zip
          body: ${{ steps.notes.outputs.body }}
